<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f0c874">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>中国象棋</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <header>
      <h1>中 国 象 棋</h1>
      <div class="subtitle">人机对弈</div>
    </header>

    <div id="board-wrapper">
      <canvas id="board"></canvas>
    </div>

    <div id="status-bar">
      <span id="status">红方走棋</span>
      <span id="thinking"><span class="spinner"></span>AI 思考中…</span>
    </div>

    <div id="controls">
      <button class="btn" id="btn-new">新 局</button>
      <button class="btn" id="btn-undo">悔 棋</button>
      <div class="select-wrap">
        <label for="difficulty">难度</label>
        <select id="difficulty">
          <option value="easy">简单</option>
          <option value="medium" selected>中等</option>
          <option value="hard">困难</option>
        </select>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
